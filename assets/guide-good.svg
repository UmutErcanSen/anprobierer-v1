<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 320" width="220" height="320">
  <rect width="220" height="320" rx="8" fill="#f0f4f8"/>
  <rect x="10" y="10" width="200" height="300" rx="6" fill="#e2e8f0"/>
  <!-- Background hint: clean wall -->
  <rect x="10" y="10" width="200" height="220" rx="6" fill="#e8edf2"/>
  <!-- Floor line -->
  <line x1="10" y1="260" x2="210" y2="260" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Person silhouette: head -->
  <circle cx="110" cy="65" r="22" fill="#64748b"/>
  <!-- Person: body/torso -->
  <path d="M92 95 L128 95 L125 150 L95 150 Z" fill="#64748b"/>
  <!-- Person: arms slightly away from body -->
  <path d="M92 100 L60 145 L62 147 L95 148 Z" fill="#64748b"/>
  <path d="M128 100 L160 145 L158 147 L125 148 Z" fill="#64748b"/>
  <!-- Person: legs -->
  <path d="M95 150 L85 210 L92 260 L108 260 L115 210 L125 150 Z" fill="#64748b"/>
  <!-- Person: feet -->
  <ellipse cx="90" cy="262" rx="10" ry="5" fill="#64748b"/>
  <ellipse cx="120" cy="262" rx="10" ry="5" fill="#64748b"/>
  <!-- Good checkmark -->
  <circle cx="195" cy="25" r="14" fill="#10b981"/>
  <path d="M188 25 L193 30 L202 19" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text label -->
  <text x="110" y="296" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#475569" font-weight="600">Ganzkörperaufnahme</text>
  <text x="110" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">Neutraler Hintergrund · gut beleuchtet</text>
</svg>
